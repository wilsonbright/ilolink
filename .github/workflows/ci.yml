name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Generate Cloudflare binding types
        # cloudflare-env.d.ts is generated (git-ignored); the app's type-check
        # needs it. `wrangler types` reads wrangler.jsonc locally — no auth/network.
        run: npx wrangler types --env-interface CloudflareEnv ./cloudflare-env.d.ts
      - name: Next build (type-check + compile)
        run: npm run build
